# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── MySQL DataSource ─────────────────────────────────────────────────────────
# Values are loaded from environment variables (see .env — never commit credentials)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# update: auto-alters tables to match entities on startup — safe for dev, never use create-drop in prod
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── Thymeleaf ────────────────────────────────────────────────────────────────
# cache=false ensures template changes reload without restarting in dev
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ─── App ──────────────────────────────────────────────────────────────────────
spring.application.name=online-shopping-system
