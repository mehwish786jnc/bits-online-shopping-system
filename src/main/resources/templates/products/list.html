<!-- Owner: HeenuReet | Product Search & Browse | Product listing with search, category filter, and product cards -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Products - e-Kiosk</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-grid me-2"></i>Products</h2>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search and Filter -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/products}" method="get" class="row g-2 align-items-end">
                <div class="col-md-5">
                    <label for="keyword" class="form-label small text-muted">Search</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" id="keyword" name="keyword"
                               placeholder="Search products..." th:value="${keyword}"/>
                    </div>
                </div>
                <div class="col-md-4">
                    <label for="category" class="form-label small text-muted">Category</label>
                    <select class="form-select" id="category" name="category">
                        <option value="">All Categories</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.name()}"
                                th:text="${cat.displayName}"
                                th:selected="${cat == selectedCategory}"></option>
                    </select>
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill">
                        <i class="bi bi-search me-1"></i>Search
                    </button>
                    <a th:href="@{/products}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-circle"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Category Pills -->
    <div class="d-flex flex-wrap gap-2 mb-4">
        <a th:href="@{/products}" class="btn btn-sm btn-outline-primary"
           th:classappend="${selectedCategory == null} ? ' active' : ''">All</a>
        <a th:each="cat : ${categories}"
           th:href="@{/products/category/{c}(c=${cat.name()})}"
           class="btn btn-sm btn-outline-primary"
           th:classappend="${cat == selectedCategory} ? ' active' : ''"
           th:text="${cat.displayName}"></a>
    </div>

    <!-- Products Grid -->
    <div th:if="${#lists.isEmpty(products)}" class="text-center py-5 text-muted">
        <i class="bi bi-search display-3 d-block mb-3"></i>
        <h5>No products found.</h5>
        <a th:href="@{/products}" class="btn btn-primary mt-2">Browse All</a>
    </div>

    <div th:if="${!#lists.isEmpty(products)}" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3">
        <div class="col" th:each="product : ${products}">
            <div class="card product-card border-0 shadow-sm h-100">
                <div class="card-body d-flex flex-column">
                    <div class="product-category-badge mb-2">
                        <span class="badge bg-primary-subtle text-primary"
                              th:text="${product.category.displayName}"></span>
                    </div>
                    <h6 class="card-title fw-semibold" th:text="${product.name}">Product Name</h6>
                    <p class="card-text text-muted small flex-grow-1"
                       th:text="${#strings.abbreviate(product.description, 80)}">Description</p>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <span class="fs-5 fw-bold text-primary"
                              th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"></span>
                        <span th:class="${product.quantityOnHand > 0 ? 'badge bg-success' : 'badge bg-danger'}"
                              th:text="${product.quantityOnHand > 0 ? 'In Stock' : 'Out of Stock'}"></span>
                    </div>
                    <p class="text-muted small mb-3" th:text="'QOH: ' + ${product.quantityOnHand} + ' units'"></p>
                </div>
                <div class="card-footer bg-transparent border-top-0 pb-3 px-3">
                    <div class="d-grid gap-2">
                        <a th:href="@{/products/{id}(id=${product.id})}"
                           class="btn btn-outline-primary btn-sm">
                            <i class="bi bi-eye me-1"></i>View Details
                        </a>
                        <form th:if="${currentUser.role.name() == 'CUSTOMER'}"
                              th:action="@{/cart/add}" method="post">
                            <input type="hidden" name="productId" th:value="${product.id}"/>
                            <input type="hidden" name="quantity" value="1"/>
                            <button type="submit" class="btn btn-primary btn-sm w-100"
                                    th:disabled="${product.quantityOnHand <= 0}">
                                <i class="bi bi-cart-plus me-1"></i>Add to Cart
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-3 text-muted small" th:if="${!#lists.isEmpty(products)}">
        Showing <span th:text="${#lists.size(products)}">0</span> product(s)
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
