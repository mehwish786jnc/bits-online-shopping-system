<!-- Owner: Aliya | Product Management | Admin form to add a new product -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <title>Add Product</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4" style="max-width: 680px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Add New Product</h2>
        <a href="/admin/products" class="btn btn-outline-secondary">Back</a>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/admin/products/add}" method="post" th:object="${product}" novalidate>
                <div class="mb-3">
                    <label class="form-label fw-bold">Product Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{name}" required/>
                    <div th:if="${#fields.hasErrors('name')}" class="text-danger small" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Description</label>
                    <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Price (₹) <span class="text-danger">*</span></label>
                        <input type="number" step="0.01" min="0" class="form-control" th:field="*{price}" required/>
                        <div th:if="${#fields.hasErrors('price')}" class="text-danger small" th:errors="*{price}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Quantity on Hand <span class="text-danger">*</span></label>
                        <input type="number" min="0" class="form-control" th:field="*{quantityOnHand}" required/>
                        <div th:if="${#fields.hasErrors('quantityOnHand')}" class="text-danger small" th:errors="*{quantityOnHand}"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Category <span class="text-danger">*</span></label>
                    <select class="form-select" th:field="*{category}" required>
                        <option value="">-- Select Category --</option>
                        <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat.displayName}"></option>
                    </select>
                    <div th:if="${#fields.hasErrors('category')}" class="text-danger small" th:errors="*{category}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Add Product</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
