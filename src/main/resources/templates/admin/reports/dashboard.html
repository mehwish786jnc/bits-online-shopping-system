<!-- Owner: Mehwish | Reports | Admin reports navigation hub with links to all report types -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <title>Reports</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h2 class="mb-4">Reports</h2>

    <div class="row g-3">
        <div class="col-md-4">
            <div class="card h-100 text-center p-3 border-primary">
                <div class="card-body">
                    <h1>📊</h1>
                    <h5>Sales Report</h5>
                    <p class="text-muted small">View orders and revenue by date range</p>
                    <a href="/admin/reports/sales" class="btn btn-primary">View Report</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 text-center p-3 border-success">
                <div class="card-body">
                    <h1>📦</h1>
                    <h5>Inventory Report</h5>
                    <p class="text-muted small">Check stock levels and low-stock alerts</p>
                    <a href="/admin/reports/inventory" class="btn btn-success">View Report</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 text-center p-3 border-warning">
                <div class="card-body">
                    <h1>💬</h1>
                    <h5>Feedback Report</h5>
                    <p class="text-muted small">All customer reviews and ratings</p>
                    <a href="/admin/feedback" class="btn btn-warning">View Report</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 text-center p-3 border-info">
                <div class="card-body">
                    <h1>📈</h1>
                    <h5>Sales Analysis</h5>
                    <p class="text-muted small">Fast and slow moving products analysis</p>
                    <a href="/admin/sales" class="btn btn-info">View Report</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
