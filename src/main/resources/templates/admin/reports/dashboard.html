<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Reports — e-Kiosk Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <style>
        .report-tile { transition: transform 0.15s, box-shadow 0.15s; }
        .report-tile:hover { transform: translateY(-4px); box-shadow: 0 0.5rem 1rem rgba(0,0,0,.15) !important; }
    </style>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">🛒 e-Kiosk Admin</span>
    <div class="d-flex gap-3 align-items-center">
        <a href="/admin/dashboard" class="text-white text-decoration-none">Dashboard</a>
        <a href="/admin/products"  class="text-white text-decoration-none">Products</a>
        <span class="text-white-50" th:text="${loggedInUser?.username}"></span>
        <a href="/logout" class="btn btn-sm btn-outline-light">Logout</a>
    </div>
</nav>

<div class="container py-4">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/admin/dashboard">Dashboard</a></li>
            <li class="breadcrumb-item active">Reports</li>
        </ol>
    </nav>

    <h4 class="mb-4 fw-bold">📊 Reports Hub</h4>

    <div class="row g-4">
        <div class="col-md-4">
            <a href="/admin/reports/sales" class="card report-tile text-decoration-none text-dark shadow-sm h-100">
                <div class="card-body text-center py-5">
                    <div class="fs-1">💰</div>
                    <div class="fw-semibold fs-5 mt-3">Sales Report</div>
                    <div class="text-muted small mt-1">Revenue, order counts, and avg order value by date range</div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/admin/reports/inventory" class="card report-tile text-decoration-none text-dark shadow-sm h-100">
                <div class="card-body text-center py-5">
                    <div class="fs-1">📦</div>
                    <div class="fw-semibold fs-5 mt-3">Inventory Report</div>
                    <div class="text-muted small mt-1">Stock levels with low-stock and out-of-stock alerts</div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/admin/reports/customers" class="card report-tile text-decoration-none text-dark shadow-sm h-100">
                <div class="card-body text-center py-5">
                    <div class="fs-1">👥</div>
                    <div class="fw-semibold fs-5 mt-3">Customer Activity</div>
                    <div class="text-muted small mt-1">Customer list with order counts and join dates</div>
                </div>
            </a>
        </div>
    </div>

</div>
</body>
</html>
