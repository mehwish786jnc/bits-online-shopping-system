<!-- Owner: Mehwish | Reports | Inventory report showing stock levels and low-stock alerts per product -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <title>Inventory Report</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid mt-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Inventory Report</h2>
        <a href="/admin/reports" class="btn btn-outline-secondary">Back to Reports</a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Product</th>
                        <th>Category</th>
                        <th>Price (₹)</th>
                        <th>QOH</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="6" class="text-center text-muted py-4">No products found.</td>
                    </tr>
                    <tr th:each="p : ${products}">
                        <td th:text="${p.id}"></td>
                        <td th:text="${p.name}"></td>
                        <td th:text="${p.category.displayName}"></td>
                        <td th:text="${p.price}"></td>
                        <td th:text="${p.quantityOnHand}"></td>
                        <td>
                            <span th:if="${p.quantityOnHand == 0}" class="badge bg-danger">Out of Stock</span>
                            <span th:if="${p.quantityOnHand > 0 and p.quantityOnHand < 5}" class="badge bg-warning text-dark">Low Stock</span>
                            <span th:if="${p.quantityOnHand >= 5}" class="badge bg-success">In Stock</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
