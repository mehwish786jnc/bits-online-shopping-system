<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Sales Report — e-Kiosk Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <style>
        .stat-card { border-left: 4px solid; }
        .stat-card.revenue { border-color: #198754; }
        .stat-card.count   { border-color: #0d6efd; }
        .stat-card.avg     { border-color: #ffc107; }
    </style>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">🛒 e-Kiosk Admin</span>
    <div class="d-flex gap-3 align-items-center">
        <a href="/admin/dashboard" class="text-white text-decoration-none">Dashboard</a>
        <a href="/admin/products"  class="text-white text-decoration-none">Products</a>
        <span class="text-white-50" th:text="${loggedInUser?.username}"></span>
        <a href="/logout" class="btn btn-sm btn-outline-light">Logout</a>
    </div>
</nav>

<div class="container py-4">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/admin/dashboard">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="/admin/reports">Reports</a></li>
            <li class="breadcrumb-item active">Sales</li>
        </ol>
    </nav>

    <h4 class="mb-4 fw-bold">💰 Sales Report</h4>

    <!-- Date range filter form — GET request; @DateTimeFormat(iso=DATE) parses ?from=yyyy-MM-dd automatically -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form method="get" action="/admin/reports/sales" class="row g-3 align-items-end">
                <div class="col-auto">
                    <label class="form-label fw-semibold">From</label>
                    <input type="date" name="from" class="form-control"
                           th:value="${from}" />
                </div>
                <div class="col-auto">
                    <label class="form-label fw-semibold">To</label>
                    <input type="date" name="to" class="form-control"
                           th:value="${to}" />
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Apply Filter</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Summary stats -->
    <div class="row g-3 mb-4">
        <div class="col-sm-4">
            <div class="card stat-card count shadow-sm h-100">
                <div class="card-body">
                    <div class="text-muted small">Orders in Period</div>
                    <div class="fs-2 fw-bold text-primary" th:text="${orders.size()}">0</div>
                </div>
            </div>
        </div>
        <div class="col-sm-4">
            <div class="card stat-card revenue shadow-sm h-100">
                <div class="card-body">
                    <div class="text-muted small">Total Revenue (₹)</div>
                    <div class="fs-2 fw-bold text-success"
                         th:text="${#numbers.formatDecimal(totalRevenue, 1, 2)}">0.00</div>
                </div>
            </div>
        </div>
        <div class="col-sm-4">
            <div class="card stat-card avg shadow-sm h-100">
                <div class="card-body">
                    <div class="text-muted small">Avg Order Value (₹)</div>
                    <div class="fs-2 fw-bold text-warning"
                         th:text="${#numbers.formatDecimal(avgOrderValue, 1, 2)}">0.00</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Orders table -->
    <div class="card shadow-sm">
        <div class="card-header fw-semibold">Order Details</div>
        <div th:if="${orders.isEmpty()}" class="p-4 text-center text-muted">
            No orders found for the selected date range.
        </div>
        <div class="table-responsive" th:if="${!orders.isEmpty()}">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Date</th>
                        <th>Customer</th>
                        <th>Status</th>
                        <th class="text-end">Amount (₹)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="o : ${orders}">
                        <td th:text="${o.id}"></td>
                        <td th:text="${#temporals.format(o.orderDate, 'dd MMM yyyy')}"></td>
                        <td th:text="${o.user.username}"></td>
                        <td>
                            <span th:text="${o.status}"
                                  th:classappend="${o.status.name() == 'DELIVERED'} ? 'badge bg-success'
                                               : (${o.status.name() == 'CANCELLED'} ? 'badge bg-danger'
                                               : (${o.status.name() == 'SHIPPED'}   ? 'badge bg-info text-dark'
                                               : (${o.status.name() == 'CONFIRMED'} ? 'badge bg-primary'
                                               : 'badge bg-secondary')))"
                                  class="badge">
                            </span>
                        </td>
                        <td class="text-end fw-semibold"
                            th:text="${#numbers.formatDecimal(o.totalAmount, 1, 2)}"></td>
                    </tr>
                </tbody>
                <tfoot class="table-light">
                    <tr>
                        <td colspan="4" class="text-end fw-bold">Total</td>
                        <td class="text-end fw-bold"
                            th:text="${#numbers.formatDecimal(totalRevenue, 1, 2)}"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

</div>
</body>
</html>
