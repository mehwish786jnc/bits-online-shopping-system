<!-- Owner: Mehwish | Reports | Sales report table with date range filter and order totals -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <title>Sales Report</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid mt-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Sales Report</h2>
        <a href="/admin/reports" class="btn btn-outline-secondary">Back to Reports</a>
    </div>

    <!-- Date Filter -->
    <div class="card mb-4">
        <div class="card-body">
            <form action="/admin/reports/sales" method="get" class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label">From Date</label>
                    <input type="date" name="from" class="form-control" th:value="${fromDate}"/>
                </div>
                <div class="col-md-3">
                    <label class="form-label">To Date</label>
                    <input type="date" name="to" class="form-control" th:value="${toDate}"/>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Apply Filter</button>
                    <a href="/admin/reports/sales" class="btn btn-outline-secondary">Reset</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Summary -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card bg-light text-center p-3">
                <h6 class="text-muted">Total Orders</h6>
                <h3 th:text="${totalOrderCount}">0</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-light text-center p-3">
                <h6 class="text-muted">Total Revenue</h6>
                <h3 th:text="'₹' + ${totalRevenue}">₹0.00</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-light text-center p-3">
                <h6 class="text-muted">Avg Order Value</h6>
                <h3 th:text="'₹' + ${avgOrderValue}">₹0.00</h3>
            </div>
        </div>
    </div>

    <!-- Orders Table -->
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Order #</th>
                        <th>Customer</th>
                        <th>Date</th>
                        <th>Items</th>
                        <th>Total (₹)</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(orders)}">
                        <td colspan="6" class="text-center text-muted py-4">No orders in selected range.</td>
                    </tr>
                    <tr th:each="o : ${orders}">
                        <td th:text="${o.id}"></td>
                        <td th:text="${o.user.username}"></td>
                        <td th:text="${#temporals.format(o.orderDate, 'dd MMM yyyy')}"></td>
                        <td th:text="${#lists.size(o.orderItems)}"></td>
                        <td th:text="${o.totalAmount}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${o.status.name() == 'CANCELLED'} ? 'bg-danger' : 'bg-success'"
                                  th:text="${o.status}"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
