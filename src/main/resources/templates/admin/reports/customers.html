<!-- Owner: Mehwish | Reports | Customer activity report showing all registered customers and their order counts -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <title>Customer Report</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid mt-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Customer Report</h2>
        <a href="/admin/reports" class="btn btn-outline-secondary">Back to Reports</a>
    </div>

    <!-- Summary card -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card bg-info text-white text-center p-3">
                <h6>Total Customers</h6>
                <h2 th:text="${totalCustomers}">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-success text-white text-center p-3">
                <h6>Active Customers</h6>
                <h2 th:text="${activeCustomers}">0</h2>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Orders</th>
                        <th>Joined</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(customers)}">
                        <td colspan="6" class="text-center text-muted py-4">No customers found.</td>
                    </tr>
                    <tr th:each="entry : ${customers}">
                        <td th:text="${entry.user.id}"></td>
                        <td th:text="${entry.user.username}"></td>
                        <td th:text="${entry.user.email}"></td>
                        <td>
                            <span class="badge bg-primary" th:text="${entry.orderCount}"></span>
                        </td>
                        <td th:text="${#temporals.format(entry.user.createdDate, 'dd MMM yyyy')}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${entry.orderCount > 0} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${entry.orderCount > 0} ? 'Active' : 'No Orders'"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
