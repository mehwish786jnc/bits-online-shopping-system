<!-- Owner: HeenuReet | Feedback | Admin view of all customer feedback with user, product, rating, date -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <title>Customer Feedback - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid mt-4 px-4">
    <h2 class="mb-4">Customer Feedback</h2>

    <div th:if="${#lists.isEmpty(feedbackList)}">
        <div class="alert alert-info">No feedback submitted yet.</div>
    </div>

    <div class="card" th:unless="${#lists.isEmpty(feedbackList)}">
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Customer</th>
                        <th>Product</th>
                        <th>Rating</th>
                        <th>Comment</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="fb : ${feedbackList}">
                        <td th:text="${fb.id}"></td>
                        <td th:text="${fb.user.username}"></td>
                        <td th:text="${fb.product != null ? fb.product.name : 'General'}"></td>
                        <td>
                            <span th:text="${fb.rating} + ' ★'"
                                  th:classappend="${fb.rating >= 4} ? 'text-success fw-bold' :
                                                 (${fb.rating == 3} ? 'text-warning fw-bold' : 'text-danger fw-bold')"></span>
                        </td>
                        <td th:text="${fb.comment}"></td>
                        <td th:text="${#temporals.format(fb.feedbackDate, 'dd MMM yyyy')}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
