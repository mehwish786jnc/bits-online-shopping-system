<!-- Owner: Mehwish | Admin Dashboard | Admin home with key metrics, low-stock alerts, and recent orders -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid mt-4 px-4">
    <h2 class="mb-4">Admin Dashboard</h2>

    <!-- Metric Cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card text-white bg-primary h-100">
                <div class="card-body">
                    <h6 class="card-title">Total Products</h6>
                    <h2 th:text="${totalProducts}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success h-100">
                <div class="card-body">
                    <h6 class="card-title">Total Orders</h6>
                    <h2 th:text="${totalOrders}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-info h-100">
                <div class="card-body">
                    <h6 class="card-title">Total Customers</h6>
                    <h2 th:text="${totalCustomers}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-warning h-100">
                <div class="card-body">
                    <h6 class="card-title">Today's Sales (₹)</h6>
                    <h2 th:text="${todaysSales}">0.00</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <!-- Low Stock Alerts -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Low Stock Alerts</h5>
                    <a href="/admin/products" class="btn btn-sm btn-outline-primary">Manage Products</a>
                </div>
                <div class="card-body p-0">
                    <table class="table table-sm mb-0">
                        <thead class="table-light">
                            <tr><th>Product</th><th>Category</th><th>QOH</th></tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(lowStockProducts)}">
                                <td colspan="3" class="text-center text-muted py-3">No low stock items</td>
                            </tr>
                            <tr th:each="p : ${lowStockProducts}">
                                <td th:text="${p.name}"></td>
                                <td th:text="${p.category.displayName}"></td>
                                <td><span class="badge bg-danger" th:text="${p.quantityOnHand}"></span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Recent Orders -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Recent Orders</h5>
                    <a href="/admin/reports/sales" class="btn btn-sm btn-outline-success">View Reports</a>
                </div>
                <div class="card-body p-0">
                    <table class="table table-sm mb-0">
                        <thead class="table-light">
                            <tr><th>#</th><th>Customer</th><th>Total</th><th>Status</th></tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(recentOrders)}">
                                <td colspan="4" class="text-center text-muted py-3">No orders yet</td>
                            </tr>
                            <tr th:each="o : ${recentOrders}">
                                <td th:text="${o.id}"></td>
                                <td th:text="${o.user.username}"></td>
                                <td th:text="'₹' + ${o.totalAmount}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${o.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                                         (${o.status.name() == 'CANCELLED'} ? 'bg-danger' : 'bg-success')"
                                          th:text="${o.status}"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
