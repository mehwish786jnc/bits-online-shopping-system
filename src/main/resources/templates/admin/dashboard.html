<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Admin Dashboard — e-Kiosk</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <style>
        .stat-card { border-left: 4px solid; }
        .stat-card.products  { border-color: #0d6efd; }
        .stat-card.orders    { border-color: #198754; }
        .stat-card.customers { border-color: #0dcaf0; }
        .stat-card.sales     { border-color: #ffc107; }
    </style>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">🛒 e-Kiosk Admin</span>
    <div class="d-flex gap-3 align-items-center">
        <a href="/admin/products" class="text-white text-decoration-none">Products</a>
        <span class="text-white-50" th:text="${loggedInUser?.username}"></span>
        <a href="/logout" class="btn btn-sm btn-outline-light">Logout</a>
    </div>
</nav>

<div class="container py-4">

    <h4 class="mb-4 fw-bold">Dashboard Overview</h4>

    <!-- Stats row -->
    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-lg-3">
            <div class="card stat-card products shadow-sm h-100">
                <div class="card-body">
                    <div class="text-muted small">Total Products</div>
                    <div class="fs-2 fw-bold text-primary" th:text="${totalProducts}">0</div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="card stat-card orders shadow-sm h-100">
                <div class="card-body">
                    <div class="text-muted small">Total Orders</div>
                    <div class="fs-2 fw-bold text-success" th:text="${totalOrders}">0</div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="card stat-card customers shadow-sm h-100">
                <div class="card-body">
                    <div class="text-muted small">Total Customers</div>
                    <div class="fs-2 fw-bold text-info" th:text="${totalCustomers}">0</div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="card stat-card sales shadow-sm h-100">
                <div class="card-body">
                    <div class="text-muted small">Today's Revenue (₹)</div>
                    <div class="fs-2 fw-bold text-warning" th:text="${#numbers.formatDecimal(todaySales, 1, 2)}">0.00</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick links -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <a href="/admin/products" class="card text-decoration-none text-dark shadow-sm h-100">
                <div class="card-body text-center py-4">
                    <div class="fs-1">📦</div>
                    <div class="fw-semibold mt-2">Manage Products</div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/admin/reports" class="card text-decoration-none text-dark shadow-sm h-100">
                <div class="card-body text-center py-4">
                    <div class="fs-1">📊</div>
                    <div class="fw-semibold mt-2">Reports</div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/admin/feedback" class="card text-decoration-none text-dark shadow-sm h-100">
                <div class="card-body text-center py-4">
                    <div class="fs-1">💬</div>
                    <div class="fw-semibold mt-2">Feedback</div>
                </div>
            </a>
        </div>
    </div>

    <!-- Low stock alerts -->
    <div class="card shadow-sm" th:if="${!lowStockProducts.isEmpty()}">
        <div class="card-header bg-warning text-dark fw-semibold">
            ⚠️ Low Stock Alert
            <span class="badge bg-danger ms-2" th:text="${lowStockProducts.size()}"></span>
        </div>
        <div class="table-responsive">
            <table class="table table-sm mb-0">
                <thead class="table-light">
                    <tr><th>Product</th><th>Category</th><th>Stock</th><th></th></tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${lowStockProducts}">
                        <td th:text="${p.name}"></td>
                        <td th:text="${p.category.displayName}"></td>
                        <td><span class="badge bg-danger" th:text="${p.quantityOnHand}"></span></td>
                        <td><a th:href="@{/admin/products/edit/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary">Edit</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="text-muted small mt-3" th:if="${lowStockProducts.isEmpty()}">
        ✅ All products are sufficiently stocked.
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
