<!-- Owner: HeenuReet | Final Integration | Thymeleaf navbar fragment with customer and admin navbars -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-shop"></i> e-Kiosk
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">
            <!-- Customer Navigation -->
            <ul th:if="${currentUser != null and currentUser.role.name() == 'CUSTOMER'}"
                class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/customer/dashboard}">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">
                        <i class="bi bi-grid"></i> Products
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/cart}">
                        <i class="bi bi-cart3"></i> Cart
                        <span th:if="${cartCount != null and cartCount > 0}"
                              class="badge bg-warning text-dark" th:text="${cartCount}">0</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/orders}">
                        <i class="bi bi-bag-check"></i> My Orders
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/feedback}">
                        <i class="bi bi-chat-square-dots"></i> Feedback
                    </a>
                </li>
            </ul>

            <!-- Admin Navigation -->
            <ul th:if="${currentUser != null and currentUser.role.name() == 'ADMIN'}"
                class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/dashboard}">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/products}">
                        <i class="bi bi-box-seam"></i> Products
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/orders}">
                        <i class="bi bi-clipboard-data"></i> Orders
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/sales}">
                        <i class="bi bi-graph-up-arrow"></i> Sales
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/reports}">
                        <i class="bi bi-file-earmark-bar-graph"></i> Reports
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/feedback}">
                        <i class="bi bi-chat-square-text"></i> Feedback
                    </a>
                </li>
            </ul>

            <!-- User info and Logout -->
            <ul th:if="${currentUser != null}" class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i>
                        <span th:text="${currentUser.username}">User</span>
                        <span class="badge bg-light text-primary ms-1"
                              th:text="${currentUser.role.name()}">ROLE</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/logout}">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
