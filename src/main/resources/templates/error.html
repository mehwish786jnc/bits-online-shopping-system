<!-- Owner: HeenuReet | Final Integration | Generic error page shown on unhandled exceptions -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <title>Error</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-5 text-center">
    <h1 class="display-1 text-danger">Oops!</h1>
    <h3 th:text="${errorMessage ?: 'Something went wrong.'}">Something went wrong.</h3>
    <p class="text-muted">Please try again or contact support if the issue persists.</p>
    <a href="/" class="btn btn-primary mt-3">Back to Home</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
