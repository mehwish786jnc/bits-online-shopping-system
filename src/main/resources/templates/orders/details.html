<!-- Owner: HeenuReet | Ordering | Order detail view with items, totals, and cancel option for PENDING orders -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <title>Order Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Order #<span th:text="${order.id}"></span></h2>
        <a href="/orders" class="btn btn-outline-secondary">Back to Orders</a>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <strong>Order Date:</strong>
                    <p th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy, HH:mm')}"></p>
                </div>
                <div class="col-md-4">
                    <strong>Status:</strong>
                    <p>
                        <span class="badge"
                              th:classappend="${order.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                             (${order.status.name() == 'CONFIRMED'} ? 'bg-info text-dark' :
                                             (${order.status.name() == 'CANCELLED'} ? 'bg-danger' : 'bg-success'))"
                              th:text="${order.status}"></span>
                    </p>
                </div>
                <div class="col-md-4">
                    <strong>Shipping Address:</strong>
                    <p th:text="${order.shippingAddress}"></p>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header"><h5 class="mb-0">Items Ordered</h5></div>
        <div class="card-body p-0">
            <table class="table table-bordered mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Product</th>
                        <th>Qty</th>
                        <th>Unit Price</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${order.orderItems}">
                        <td th:text="${item.product.name}"></td>
                        <td th:text="${item.quantity}"></td>
                        <td th:text="'₹' + ${item.price}"></td>
                        <td th:text="'₹' + ${item.subtotal}"></td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr class="table-light fw-bold">
                        <td colspan="3" class="text-end">Total:</td>
                        <td th:text="'₹' + ${order.totalAmount}"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div th:if="${order.status.name() == 'PENDING' or order.status.name() == 'CONFIRMED'}">
        <form th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post"
              onsubmit="return confirm('Are you sure you want to cancel this order?')">
            <button type="submit" class="btn btn-danger">Cancel Order</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
