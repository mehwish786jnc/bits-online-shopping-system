<!-- Owner: HeenuReet | Ordering | Table of all user orders with status and detail link -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Orders - e-Kiosk</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">
            <i class="bi bi-bag-check me-2"></i>
            <span th:text="${currentUser.role.name() == 'ADMIN'} ? 'All Orders' : 'My Orders'">Orders</span>
        </h2>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
        <i class="bi bi-inbox display-1 text-muted d-block mb-3"></i>
        <h4 class="text-muted">No orders found</h4>
        <a th:href="@{/products}" class="btn btn-primary mt-2">Start Shopping</a>
    </div>

    <!-- Orders Table -->
    <div th:if="${!#lists.isEmpty(orders)}" class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Order #</th>
                            <th th:if="${currentUser.role.name() == 'ADMIN'}">Customer</th>
                            <th>Date</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td class="fw-semibold" th:text="'#' + ${order.id}"></td>
                            <td th:if="${currentUser.role.name() == 'ADMIN'}"
                                th:text="${order.user.username}"></td>
                            <td th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy')}"></td>
                            <td th:text="${#lists.size(order.orderItems)} + ' item(s)'"></td>
                            <td class="fw-semibold"
                                th:text="'$' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></td>
                            <td>
                                <span th:class="${'badge status-' + order.status.name().toLowerCase()}"
                                      th:text="${order.status}"></span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/orders/{id}(id=${order.id})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-eye me-1"></i>View
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-transparent text-muted small py-2">
            Total: <span th:text="${#lists.size(orders)}"></span> order(s)
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
