<!-- Owner: Aliya | Ordering | Order cancellation confirmation page shown before cancelling an order -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <title>Cancel Order</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5" style="max-width: 600px;">
    <div class="card border-danger">
        <div class="card-header bg-danger text-white">
            <h5 class="mb-0">Cancel Order #<span th:text="${order.id}"></span></h5>
        </div>
        <div class="card-body">
            <p class="mb-3">Are you sure you want to cancel this order? This action cannot be undone and your items will be restocked.</p>

            <table class="table table-sm mb-4">
                <thead class="table-light">
                    <tr><th>Product</th><th>Qty</th><th>Subtotal</th></tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${order.orderItems}">
                        <td th:text="${item.product.name}"></td>
                        <td th:text="${item.quantity}"></td>
                        <td th:text="'₹' + ${item.subtotal}"></td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr class="fw-bold">
                        <td colspan="2" class="text-end">Order Total:</td>
                        <td th:text="'₹' + ${order.totalAmount}"></td>
                    </tr>
                </tfoot>
            </table>

            <div class="d-flex gap-2">
                <form th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post" class="flex-fill">
                    <button type="submit" class="btn btn-danger w-100">Yes, Cancel Order</button>
                </form>
                <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-outline-secondary flex-fill">
                    No, Keep Order
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
