<!-- Owner: HeenuReet | Feedback | Customer feedback submission form with optional product selection and star rating -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <title>Submit Feedback</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4" style="max-width: 640px;">
    <h2 class="mb-4">Submit Feedback</h2>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/feedback}" method="post" th:object="${feedback}" novalidate>
                <div class="mb-3">
                    <label class="form-label">Product (optional)</label>
                    <select class="form-select" th:field="*{product.id}">
                        <option value="">-- General Feedback --</option>
                        <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Rating <span class="text-danger">*</span></label>
                    <div>
                        <div class="form-check form-check-inline" th:each="i : ${#numbers.sequence(1,5)}">
                            <input class="form-check-input" type="radio" th:field="*{rating}" th:value="${i}" th:id="'rating'+${i}" required/>
                            <label class="form-check-label" th:for="'rating'+${i}" th:text="${i} + ' ★'"></label>
                        </div>
                        <div th:if="${#fields.hasErrors('rating')}" class="text-danger small" th:errors="*{rating}"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Comment <span class="text-danger">*</span></label>
                    <textarea class="form-control" th:field="*{comment}" rows="4" placeholder="Share your experience..." required></textarea>
                    <div th:if="${#fields.hasErrors('comment')}" class="text-danger small" th:errors="*{comment}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Submit Feedback</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
