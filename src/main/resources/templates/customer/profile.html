<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>My Profile — e-Kiosk</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/customer/dashboard">🛒 e-Kiosk</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" th:text="${user.username}">User</a>
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="d-flex align-items-center mb-4">
                <a href="/customer/dashboard" class="text-muted me-3">← Back</a>
                <h4 class="mb-0">My Profile</h4>
            </div>

            <!-- Flash messages -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" th:text="${success}">
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" th:text="${error}">
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/customer/profile/update}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <input type="text" name="username" class="form-control"
                                   th:value="${user.username}" required minlength="3" maxlength="50"/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" name="email" class="form-control"
                                   th:value="${user.email}" required maxlength="100"/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                New Password
                                <span class="text-muted fw-normal">(leave blank to keep current)</span>
                            </label>
                            <!-- BCrypt re-encoding only triggered when this field is non-blank -->
                            <input type="password" name="newPassword" class="form-control"
                                   placeholder="Enter new password" minlength="6"/>
                        </div>

                        <hr class="my-3"/>

                        <div class="mb-4">
                            <p class="text-muted small mb-1">Member since</p>
                            <p class="mb-0" th:text="${#temporals.format(user.createdDate, 'dd MMM yyyy')}">01 Jan 2026</p>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Update Profile</button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
