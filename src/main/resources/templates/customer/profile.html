<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <title>My Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4" style="max-width: 600px;">
    <h2 class="mb-4">My Profile</h2>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card mb-4">
        <div class="card-header"><h5 class="mb-0">Account Details</h5></div>
        <div class="card-body">
            <form th:action="@{/customer/profile}" method="post" novalidate>
                <div class="mb-3">
                    <label class="form-label fw-bold">Username</label>
                    <input type="text" class="form-control" name="username"
                           th:value="${currentUser.username}" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Email</label>
                    <input type="email" class="form-control" name="email"
                           th:value="${currentUser.email}" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">New Password <span class="text-muted small">(leave blank to keep current)</span></label>
                    <input type="password" class="form-control" name="newPassword" placeholder="Min. 6 characters" autocomplete="new-password"/>
                </div>
                <button type="submit" class="btn btn-primary w-100">Update Profile</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="row text-center">
                <div class="col-4">
                    <h4 th:text="${orderCount}">0</h4>
                    <small class="text-muted">Orders</small>
                </div>
                <div class="col-4">
                    <h4 th:text="${feedbackCount}">0</h4>
                    <small class="text-muted">Reviews</small>
                </div>
                <div class="col-4">
                    <h4 th:text="${cartCount}">0</h4>
                    <small class="text-muted">In Cart</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
