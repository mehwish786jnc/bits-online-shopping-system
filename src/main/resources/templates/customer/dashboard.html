<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Dashboard — e-Kiosk</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <style>
        .dashboard-tile {
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            text-decoration: none;
            color: inherit;
        }
        .dashboard-tile:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 20px rgba(0,0,0,.12);
        }
    </style>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/customer/dashboard">🛒 e-Kiosk</a>
        <div class="navbar-nav ms-auto align-items-center gap-2">
            <a class="nav-link" href="/customer/profile" th:text="${user.username}">User</a>
            <a class="nav-link position-relative" href="/cart">
                Cart
                <span class="badge bg-danger rounded-pill ms-1"
                      th:text="${cartCount}"
                      th:if="${cartCount > 0}">0</span>
            </a>
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h4 class="mb-1">Welcome back, <span class="text-primary" th:text="${user.username}">User</span>!</h4>
    <p class="text-muted mb-4">Here's your shopping overview</p>

    <!-- Stats cards -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body py-3">
                    <h2 class="display-6 fw-bold text-primary mb-0" th:text="${cartCount}">0</h2>
                    <p class="text-muted small mb-0">Items in Cart</p>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body py-3">
                    <h2 class="display-6 fw-bold text-success mb-0" th:text="${orderCount}">0</h2>
                    <p class="text-muted small mb-0">Total Orders</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation tiles -->
    <h5 class="mb-3">Quick Links</h5>
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <a href="/products" class="card dashboard-tile border-0 shadow-sm p-3 text-center d-block">
                <div class="fs-1">🛍️</div>
                <div class="fw-semibold mt-1">Browse Products</div>
            </a>
        </div>
        <div class="col-6 col-md-3">
            <a href="/cart" class="card dashboard-tile border-0 shadow-sm p-3 text-center d-block">
                <div class="fs-1">🛒</div>
                <div class="fw-semibold mt-1">My Cart</div>
            </a>
        </div>
        <div class="col-6 col-md-3">
            <a href="/customer/orders" class="card dashboard-tile border-0 shadow-sm p-3 text-center d-block">
                <div class="fs-1">📦</div>
                <div class="fw-semibold mt-1">My Orders</div>
            </a>
        </div>
        <div class="col-6 col-md-3">
            <a href="/customer/profile" class="card dashboard-tile border-0 shadow-sm p-3 text-center d-block">
                <div class="fs-1">👤</div>
                <div class="fw-semibold mt-1">My Profile</div>
            </a>
        </div>
    </div>

    <!-- Recent Orders -->
    <h5 class="mb-3">Recent Orders</h5>
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <p th:if="${#lists.isEmpty(recentOrders)}" class="text-muted mb-0">
                No orders yet. <a href="/products">Start shopping!</a>
            </p>
            <table th:unless="${#lists.isEmpty(recentOrders)}" class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Order #</th>
                        <th>Date</th>
                        <th>Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${recentOrders}">
                        <td th:text="${order.id}">1</td>
                        <td th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy')}">01 Jan 2026</td>
                        <td th:text="'₹' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}">₹0.00</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${order.status.name() == 'DELIVERED'} ? 'bg-success'
                                               : (${order.status.name() == 'CANCELLED'} ? 'bg-danger'
                                               : (${order.status.name() == 'SHIPPED'} ? 'bg-info text-dark'
                                               : 'bg-warning text-dark'))"
                                  th:text="${order.status}">PENDING</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
