<!-- Owner: Mehwish | Customer Dashboard | Welcome card, stats, and quick navigation tiles -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Dashboard - e-Kiosk</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Welcome Card -->
    <div class="card bg-primary text-white mb-4 border-0 shadow-sm">
        <div class="card-body py-4">
            <div class="row align-items-center">
                <div class="col">
                    <h2 class="mb-1">
                        <i class="bi bi-person-circle me-2"></i>
                        Welcome back, <span th:text="${currentUser.username}">User</span>!
                    </h2>
                    <p class="mb-0 opacity-75">
                        <i class="bi bi-calendar3 me-1"></i> Ready to shop today?
                    </p>
                </div>
                <div class="col-auto">
                    <i class="bi bi-shop display-3 opacity-50"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-md-4">
            <div class="card stat-card text-center border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="stat-icon text-warning mb-2">
                        <i class="bi bi-cart3 display-5"></i>
                    </div>
                    <h3 class="fw-bold" th:text="${cartCount}">0</h3>
                    <p class="text-muted mb-0">Items in Cart</p>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-md-4">
            <div class="card stat-card text-center border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="stat-icon text-success mb-2">
                        <i class="bi bi-bag-check display-5"></i>
                    </div>
                    <h3 class="fw-bold" th:text="${totalOrders}">0</h3>
                    <p class="text-muted mb-0">Total Orders</p>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-md-4">
            <div class="card stat-card text-center border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="stat-icon text-info mb-2">
                        <i class="bi bi-star display-5"></i>
                    </div>
                    <h3 class="fw-bold">Shop</h3>
                    <p class="text-muted mb-0">Explore Products</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Navigation -->
    <h5 class="fw-semibold mb-3">Quick Actions</h5>
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <a th:href="@{/products}" class="text-decoration-none">
                <div class="card quick-nav-tile text-center border-0 shadow-sm py-3 h-100">
                    <div class="card-body">
                        <i class="bi bi-grid display-5 text-primary mb-2"></i>
                        <p class="mb-0 fw-semibold">Browse Products</p>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-3">
            <a th:href="@{/cart}" class="text-decoration-none">
                <div class="card quick-nav-tile text-center border-0 shadow-sm py-3 h-100">
                    <div class="card-body">
                        <i class="bi bi-cart3 display-5 text-warning mb-2"></i>
                        <p class="mb-0 fw-semibold">My Cart</p>
                        <span th:if="${cartCount > 0}" class="badge bg-warning text-dark"
                              th:text="${cartCount} + ' items'">0 items</span>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-3">
            <a th:href="@{/orders}" class="text-decoration-none">
                <div class="card quick-nav-tile text-center border-0 shadow-sm py-3 h-100">
                    <div class="card-body">
                        <i class="bi bi-bag-check display-5 text-success mb-2"></i>
                        <p class="mb-0 fw-semibold">My Orders</p>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-3">
            <a th:href="@{/feedback}" class="text-decoration-none">
                <div class="card quick-nav-tile text-center border-0 shadow-sm py-3 h-100">
                    <div class="card-body">
                        <i class="bi bi-chat-dots display-5 text-info mb-2"></i>
                        <p class="mb-0 fw-semibold">Give Feedback</p>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- Recent Orders -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-bottom py-3">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-clock-history me-2"></i>Recent Orders</h5>
                <a th:href="@{/orders}" class="btn btn-outline-primary btn-sm">View All</a>
            </div>
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(recentOrders)}" class="text-center py-4 text-muted">
                <i class="bi bi-inbox display-4 d-block mb-2"></i>
                No orders yet. <a th:href="@{/products}">Start shopping!</a>
            </div>
            <div th:if="${!#lists.isEmpty(recentOrders)}" class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Order #</th>
                            <th>Date</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${recentOrders}">
                            <td class="fw-semibold" th:text="'#' + ${order.id}"></td>
                            <td th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy')}"></td>
                            <td th:text="'$' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></td>
                            <td>
                                <span th:class="${'badge status-' + order.status.name().toLowerCase()}"
                                      th:text="${order.status}"></span>
                            </td>
                            <td>
                                <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary">
                                    View
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
